name: Trigger Integration Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  trigger-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Determine correct SHA
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "COMMIT_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Trigger Test-Framework via repository_dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TEST_FRAMEWORK_TOKEN }}
          repository: EmirTutar/ECAL_Test_Framework
          event-type: run-tests
          client-payload: |
            {
              "sha": "${{ env.COMMIT_SHA }}",
              "repo": "${{ github.repository }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Test reports and logs
        run: |
          echo "ECAL-Testsframework has been triggered."
          echo ""
          echo "View status and logs:"
          echo "https://github.com/EmirTutar/ECAL_Test_Framework/actions"
          echo ""
          echo "Test report (available after completion):"
          echo "https://emirtutar.github.io/ECAL_Test_Framework/"
